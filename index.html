<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة المزاد 🔥</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fbbf24; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 40px; border-radius: 28px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-size: 2.5rem; color: var(--primary); margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: white; text-align: center; font-size: 1.1rem; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-join { background: #3b82f6; color: white; }
        .btn-host { background: #ef4444; color: white; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="card">
        <h1>لعبة المزاد 🔨</h1>
        <input type="text" id="nameInput" placeholder="اكتب اسمك الحقيقي">
        <div style="margin: 20px 0; border-top: 1px solid #334155; pt: 20px;">
            <input type="number" id="pinInput" placeholder="كود الغرفة (4 أرقام)">
            <button class="btn btn-join" onclick="joinRoom()">انضمام للتحدي</button>
        </div>
        <button class="btn btn-host" onclick="createRoom()">إنشاء تحدي جديد</button>
    </div>
    <script>
        function createRoom() {
            const name = document.getElementById('nameInput').value;
            if(!name) return alert("اكتب اسمك أولاً");
            const pin = Math.floor(1000 + Math.random() * 9000);
            window.location.href = `game.html?pin=${pin}&name=${encodeURIComponent(name)}&role=host`;
        }
        function joinRoom() {
            const name = document.getElementById('nameInput').value;
            const pin = document.getElementById('pinInput').value;
            if(!name || !pin) return alert("اكمل البيانات");
            window.location.href = `game.html?pin=${pin}&name=${encodeURIComponent(name)}`;
        }
    </script>
</body>
</html>
