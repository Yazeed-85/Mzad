<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المزاد 🔥</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fbbf24; --bg: #0f172a; --card: #1e293b;
            --danger: #ef4444; --success: #10b981; --accent: #8b5cf6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; user-select: none; }
        body { 
            background: var(--bg); color: white; height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden;
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            touch-action: manipulation;
        }

        /* ===== اللوبي ===== */
        #lobbyUI { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background-image: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            gap: 18px; padding: 30px;
        }
        .lobby-title { font-size: 3.5rem; color: var(--primary); font-weight: 900; }
        .lobby-pin-box {
            background: rgba(251,191,36,0.1); border: 2px solid var(--primary);
            border-radius: 20px; padding: 20px 40px; text-align: center;
            animation: glow-pulse 2s infinite;
        }
        @keyframes glow-pulse {
            0%,100% { box-shadow: 0 0 15px rgba(251,191,36,0.2); }
            50% { box-shadow: 0 0 40px rgba(251,191,36,0.5); }
        }
        .lobby-pin-label { font-size: 1rem; color: #94a3b8; margin-bottom: 5px; }
        .lobby-pin-val { font-size: 3rem; font-weight: 900; color: var(--primary); letter-spacing: 8px; }
        .btn-start { 
            background: var(--primary); color: #000; padding: 15px 50px; 
            font-size: 1.5rem; border-radius: 50px; border: none; cursor: pointer; 
            font-weight: 900; transition: 0.2s; 
        }
        .btn-start:active { transform: scale(0.96); }
        .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ===== السؤال ===== */
        .top-header {
            background: rgba(15,23,42,0.98); backdrop-filter: blur(15px);
            padding: 12px 15px; border-bottom: 3px solid var(--accent); text-align: center;
            z-index: 10; min-height: 85px; display: flex; flex-direction: column; justify-content: center;
        }
        #qText { 
            font-size: 1.75rem; font-weight: 900; color: #fff; 
            line-height: 1.3; max-width: 900px; margin: 0 auto;
            text-shadow: 0 0 20px rgba(139,92,246,0.7);
        }
        .q-underline {
            height: 4px; width: 0; 
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 8px auto 0; border-radius: 10px;
            animation: pulse-glow 2s infinite; 
            transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        @keyframes pulse-glow {
            0%,100% { opacity: 0.4; }
            50% { opacity: 1; box-shadow: 0 0 25px var(--primary); }
        }

        /* ===== الساحة ===== */
        .arena { flex: 1; display: flex; position: relative; width: 100%; overflow: hidden; }
        .player-side {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 15px; position: relative; gap: 12px;
        }
        /* في RTL: أول عنصر = يمين، ثاني عنصر = يسار */
        /* "أنا" سيكون دائماً في #side-me (العنصر الأول = يمين) */
        #side-me { border-left: 1px solid rgba(255,255,255,0.07); }

        .player-name-label { 
            font-size: 1.1rem; font-weight: 900; color: #94a3b8; 
            background: rgba(255,255,255,0.05); padding: 5px 18px; border-radius: 30px;
        }
        .my-label { color: var(--primary) !important; background: rgba(251,191,36,0.08) !important; border: 1px solid rgba(251,191,36,0.25); }

        .player-score-big { font-size: 2.8rem; font-weight: 900; color: var(--accent); line-height: 1; }
        .player-score-sub { font-size: 0.8rem; color: #64748b; }

        /* زر المزايدة */
        .bid-btn-big {
            width: 105px; height: 105px; border-radius: 50%;
            background: radial-gradient(circle, #22c55e, #15803d);
            border: none; font-size: 3.5rem; color: #fff;
            box-shadow: 0 0 35px rgba(34,197,94,0.45), 0 8px 20px rgba(0,0,0,0.4);
            cursor: pointer; transition: 0.15s; font-weight: 900;
            display: none; align-items: center; justify-content: center;
        }
        .bid-btn-big:active { transform: scale(0.91); }
        .bid-btn-big:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

        /* مربع عداد النقرات */
        .click-counter-box {
            width: 105px; height: 105px; border-radius: 22px;
            background: rgba(59,130,246,0.08); border: 3px solid rgba(59,130,246,0.4);
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .click-counter-val { font-size: 2.8rem; font-weight: 900; color: #60a5fa; }
        .click-counter-lbl { font-size: 0.75rem; color: #64748b; }

        /* ===== الكونسول المركزي ===== */
        .center-hub {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 225px; z-index: 5; text-align: center;
            background: #080f1e; border: 4px solid var(--accent);
            border-radius: 30px; padding: 16px 12px; 
            box-shadow: 0 0 70px rgba(0,0,0,0.95), 0 0 40px rgba(139,92,246,0.25);
        }
        .hub-label { color: #475569; font-size: 0.78rem; font-weight: bold; margin-bottom: 4px; }
        .current-bid-val { font-size: 4rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .bidder-name-lbl { font-size: 0.85rem; color: #cbd5e1; font-weight: bold; margin-top: 5px; }
        .btn-go { 
            width: 100%; padding: 11px; 
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            color: white; font-size: 1rem; font-weight: 900;
            border: none; border-radius: 16px; cursor: pointer; transition: 0.2s;
            margin-top: 12px;
        }
        .btn-go:active { transform: scale(0.95); }
        .btn-go:disabled { background: #1e293b; color: #475569; cursor: not-allowed; transform: none; }
        .btn-skip {
            width: 100%; padding: 8px;
            background: rgba(239,68,68,0.1); color: #f87171;
            border: 1px solid rgba(239,68,68,0.4); border-radius: 14px;
            font-size: 0.85rem; font-weight: 900; cursor: pointer; transition: 0.2s;
            margin-top: 8px; display: none;
        }
        .btn-skip:active { transform: scale(0.95); }

        /* ===== شاشة التحدي ===== */
        .challenge-overlay {
            position: fixed; inset: 0; background: rgba(5,10,20,0.98); z-index: 2500;
            display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
        }
        .ch-header { font-size: 1.2rem; color: #94a3b8; font-weight: bold; }
        #timerDisplay { 
            font-size: 7.5rem; font-weight: 900; color: var(--danger); line-height: 1;
            text-shadow: 0 0 30px rgba(239,68,68,0.5);
        }
        #timerDisplay.warning { animation: timer-flash 0.5s infinite; }
        @keyframes timer-flash { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
        .goal-row { 
            font-size: 1.5rem; color: var(--primary); font-weight: 900;
            background: rgba(251,191,36,0.1); padding: 8px 25px; border-radius: 50px;
            border: 1px solid rgba(251,191,36,0.3);
        }
        .clicker-circle {
            width: 230px; height: 230px; border-radius: 50%;
            background: radial-gradient(circle, #2563eb, #1e3a8a);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 60px rgba(59,130,246,0.4), 0 0 0 12px rgba(59,130,246,0.08);
            cursor: pointer; border: none; transition: 0.1s; gap: 5px;
        }
        .clicker-circle:active { transform: scale(0.93); }
        .clicker-circle.locked { 
            background: radial-gradient(circle, #374151, #1f2937); 
            cursor: not-allowed; box-shadow: none; pointer-events: none;
        }
        .clicker-big-num { font-size: 5.5rem; font-weight: 900; color: #fff; line-height: 1; }
        .clicker-hint { font-size: 0.9rem; color: rgba(255,255,255,0.5); }

        /* ===== شريط النقاط ===== */
        .footer-scores {
            background: #0a1220; padding: 10px 20px; 
            display: flex; justify-content: space-around; align-items: center;
            border-top: 2px solid #1e293b; z-index: 10;
        }
        .score-col { text-align: center; }
        .score-col-name { font-weight: 900; font-size: 0.9rem; color: #94a3b8; }
        .round-dots { display: flex; gap: 8px; margin-top: 5px; justify-content: center; }
        .dot { width: 15px; height: 15px; border-radius: 50%; background: #1e293b; transition: 0.3s; border: 2px solid #334155; }
        .dot.won { background: var(--success); box-shadow: 0 0 12px var(--success); border-color: var(--success); }
        .vs-badge { font-size: 1.4rem; font-weight: 900; color: var(--accent); }

        /* ===== أوفرلي الرسائل ===== */
        .overlay-msg { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 4000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; padding: 30px; gap: 15px;
        }
        .overlay-msg h1 { font-size: 3rem; color: var(--primary); }
        .overlay-msg p { font-size: 1.25rem; color: #cbd5e1; white-space: pre-line; }
        .btn-continue { 
            background: var(--accent); color: white; padding: 14px 55px; 
            font-size: 1.2rem; font-weight: 900; border: none; border-radius: 50px; cursor: pointer;
        }

        /* ===== سكب ===== */
        .skip-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 3500;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 30px; gap: 20px;
        }
        .skip-overlay h2 { font-size: 2.5rem; color: var(--danger); font-weight: 900; }
        .skip-overlay p { font-size: 1.1rem; color: #94a3b8; }
        .btn-skip-c { background: #dc2626; color: white; padding: 14px 50px; font-size: 1.2rem; font-weight: 900; border: none; border-radius: 50px; cursor: pointer; }
        .btn-skip-x { background: #334155; color: white; padding: 12px 40px; font-size: 1rem; font-weight: 900; border: none; border-radius: 50px; cursor: pointer; }

        @media (max-width: 600px) {
            .center-hub { width: 190px; padding: 13px 10px; }
            .current-bid-val { font-size: 3rem; }
            #qText { font-size: 1.35rem; }
            .bid-btn-big { width: 85px; height: 85px; font-size: 2.8rem; }
            .clicker-circle { width: 195px; height: 195px; }
            .clicker-big-num { font-size: 4.2rem; }
        }
    </style>
</head>
<body>

<!-- اللوبي -->
<div id="lobbyUI">
    <div class="lobby-title">المزاد 🔥</div>
    <p id="lobbyStatus" style="color:#94a3b8;font-size:1.1rem;">جاري الاتصال...</p>
    <div class="lobby-pin-box" id="hostPinBox" style="display:none;">
        <div class="lobby-pin-label">📋 أرسل هذا الكود لصاحبك</div>
        <div class="lobby-pin-val" id="lobbyPinVal">----</div>
    </div>
    <div id="hostActions" style="display:none; text-align:center;">
        <button class="btn-start" id="startBtn" onclick="hostStartGame()" disabled>⏳ في انتظار الخصم...</button>
    </div>
    <div id="guestWaiting" style="display:none; color:#64748b; font-size:1rem;">في انتظار الهوست ليبدأ...</div>
</div>

<!-- السؤال -->
<div class="top-header">
    <h2 id="qText">⚡ في انتظار البدء...</h2>
    <div class="q-underline" id="qUnderline"></div>
</div>

<!-- الساحة -->
<!-- في RTL: العنصر الأول يظهر على اليمين -->
<!-- سنضع "أنا" دائماً على اليمين = العنصر الأول -->
<div class="arena">
    <!-- أنا (يمين دائماً) -->
    <div class="player-side" id="side-me">
        <div class="player-name-label my-label" id="myLabel">أنا</div>
        <div class="bid-btn-big" id="myBidBtn" onclick="bid()">+</div>
        <div class="click-counter-box" id="myClickBox">
            <div class="click-counter-val" id="myClickVal">0</div>
            <div class="click-counter-lbl">نقرة</div>
        </div>
        <div class="player-score-big" id="myScoreLabel">0</div>
        <div class="player-score-sub">نقطة</div>
    </div>

    <!-- الكونسول المركزي -->
    <div class="center-hub">
        <div class="hub-label">أعلى مزايدة</div>
        <div class="current-bid-val" id="bidDisplay">0</div>
        <div class="bidder-name-lbl" id="bidderName">ابدأ المزايدة</div>
        <button class="btn-go" id="goBtn" onclick="sendGo()">روح أنت 🚀</button>
        <button class="btn-skip" id="skipBtn" onclick="showSkipDialog()">⏭ سكب السؤال</button>
    </div>

    <!-- الخصم (يسار دائماً) -->
    <div class="player-side" id="side-opp">
        <div class="player-name-label" id="oppLabel">الخصم</div>
        <div class="click-counter-box" id="oppClickBox">
            <div class="click-counter-val" id="oppClickVal">0</div>
            <div class="click-counter-lbl">نقرة</div>
        </div>
        <div class="player-score-big" id="oppScoreLabel">0</div>
        <div class="player-score-sub">نقطة</div>
    </div>
</div>

<!-- شريط النقاط -->
<div class="footer-scores">
    <div class="score-col">
        <div class="score-col-name" id="myFooterName">أنا</div>
        <div class="round-dots" id="myRoundDots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="score-col">
        <div class="score-col-name" id="oppFooterName">الخصم</div>
        <div class="round-dots" id="oppRoundDots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>
</div>

<!-- شاشة التحدي -->
<div class="challenge-overlay" id="challengeOverlay">
    <div class="ch-header" id="chHeader">وقت التحدي!</div>
    <div id="timerDisplay">30</div>
    <div class="goal-row">الهدف: <span id="goalVal">0</span>&nbsp;|&nbsp;وصل: <span id="reachedVal">0</span></div>
    <button class="clicker-circle" id="mainClicker" onclick="registerPoint()">
        <span class="clicker-big-num" id="liveCounter">0</span>
        <span class="clicker-hint" id="clickerHint">اضغط مع كل إجابة</span>
    </button>
</div>

<!-- رسائل عامة -->
<div class="overlay-msg" id="msgOverlay">
    <h1 id="msgTitle"></h1>
    <p id="msgBody"></p>
    <button class="btn-continue" onclick="hideOverlay()">متابعة ✌️</button>
</div>

<!-- سكب -->
<div class="skip-overlay" id="skipOverlay">
    <h2>⏭ سكب السؤال؟</h2>
    <p>سيتم اختيار سؤال جديد وتصفير المزايدة</p>
    <button class="btn-skip-c" onclick="confirmSkip()">نعم، سكب</button>
    <button class="btn-skip-x" onclick="closeSkipDialog()">إلغاء</button>
</div>

"شيء يُورَث من الأجداد", "شيء يحرص الناس على شرائه في العيد",
"شيء يُقدَّم للضيف في السعودية", "شيء يُقدَّم للضيف في مصر",
"مسابقة شعبية مشهورة", "أغنية يحفظها الجميع",
"لحن يرفع الهمة", "جملة تقولها عندما تفرح",
"جملة تقولها عندما تتفاجأ", "جملة تقولها عندما تتعب",
"نوع من الرياح", "نوع من السحاب", "نوع من الأمطار",
"شيء يحدث بعد المطر", "شيء يحدث في الغروب",
"شيء يحدث عند الفجر", "نجم أو كوكب يراه الناس بالعين",
"شيء في السماء غير النجوم", "ظاهرة فلكية مشهورة",
"حيوان مذكور في القرآن", "نبات مذكور في القرآن",
"مكان مذكور في القرآن", "شيء من آيات الكون"
];
function randomQ() {
    return "كم تقدر تذكر " + qTopics[Math.floor(Math.random() * qTopics.length)] + " في 30 ثانية؟";
}

let roomData     = {};
let localTimer   = null;
let prevStatus   = null;
let prevQ        = null;
// قفل لمنع تكرار finalizeRound محلياً
let finalizeLock = false;

// ==============================
// إعداد أولي
// ==============================
if (isHost) {
    document.getElementById('hostPinBox').style.display  = 'block';
    document.getElementById('lobbyPinVal').innerText     = pin;
    document.getElementById('hostActions').style.display = 'block';
    set(roomRef, {
        p1: { id: myId, name: myName, score: 0, roundsWon: 0 },
        state: { 
            status: 'lobby', bid: 0, bidderId: null, 
            q: randomQ(), points: 0, startTime: 0, 
            finalized: false  // حماية من التكرار
        }
    });
} else {
    document.getElementById('guestWaiting').style.display = 'block';
    get(roomRef).then(snap => {
        if (snap.exists()) {
            update(roomRef, { p2: { id: myId, name: myName, score: 0, roundsWon: 0 } });
        }
    });
}

// ==============================
// الاستماع للبيانات
// ==============================
onValue(roomRef, snap => {
    if (!snap.exists()) return;
    const nd = snap.val();
    const ns = nd.state?.status;
    const nq = nd.state?.q;

    // كتابة تدريجية للسؤال عند بدء المزاد أو تغيير السؤال
    if (ns === 'auction' && (prevStatus !== 'auction' || prevQ !== nq)) {
        typeWriter(nq);
    }

    // إذا خرجنا من التحدي = نوقف التايمر ونفتح القفل
    if (prevStatus === 'challenging' && ns !== 'challenging') {
        stopTimer();
        finalizeLock = false;
    }

    // رسالة نهاية الجولة لكل اللاعبين
    if (ns === 'roundover' && prevStatus !== 'roundover') {
        const wId  = nd.state.roundWinnerId;
        const wName = wId === nd.p1?.id ? nd.p1.name : nd.p2?.name;
        showMsg('🎯 نهاية الجولة!', `كفو يا ${wName}!\nفزت بهذه الجولة 🎉\nجولة جديدة في ثوانٍ...`);
        setTimeout(hideOverlay, 3500);
    }

    // رسالة الفوز النهائي لكل اللاعبين
    if (ns === 'gameover' && prevStatus !== 'gameover') {
        const wId   = nd.state.winnerId;
        const wName = wId === nd.p1?.id ? nd.p1.name : nd.p2?.name;
        showMsg('🏆 بطل المزاد!', `يا وحش يا ${wName}!\nحسمت المباراة لصالحك! 🏆`);
        // الهوست يعيد الجميع للوبي بعد 6 ثوانٍ
        if (isHost) {
            setTimeout(() => {
                update(stateRef, { 
                    status: 'lobby', bid: 0, bidderId: null, 
                    points: 0, startTime: 0, finalized: false 
                });
            }, 6000);
        }
    }

    prevStatus = ns;
    prevQ      = nq;
    roomData   = nd;
    renderUI();
});

// ==============================
// رسم الواجهة
// ==============================
function renderUI() {
    const st = roomData.state;
    const p1 = roomData.p1;
    const p2 = roomData.p2;
    if (!st || !p1) return;

    const me  = roomData[myKey];
    const opp = roomData[oppKey];
    if (!me) return;

    // ---- اللوبي ----
    if (st.status === 'lobby') {
        document.getElementById('lobbyUI').style.display = 'flex';
        if (p1 && p2) {
            const oppName = isHost ? p2.name : p1.name;
            document.getElementById('lobbyStatus').innerText = `الخصم متصل: ${oppName} 🔥`;
            if (isHost) {
                const btn = document.getElementById('startBtn');
                btn.disabled  = false;
                btn.innerText = '▶️ ابدأ التحدي الآن';
            }
        } else {
            document.getElementById('lobbyStatus').innerText = 'في انتظار الخصم...';
        }
        return;
    }
    document.getElementById('lobbyUI').style.display = 'none';

    // ---- الأسماء والنقاط ----
    document.getElementById('myLabel').innerText      = me.name + ' (أنت)';
    document.getElementById('oppLabel').innerText     = opp?.name || '...';
    document.getElementById('myScoreLabel').innerText = me.score || 0;
    document.getElementById('oppScoreLabel').innerText = opp?.score || 0;
    document.getElementById('myFooterName').innerText  = me.name;
    document.getElementById('oppFooterName').innerText = opp?.name || '...';
    renderRounds('myRoundDots',  me.roundsWon  || 0);
    renderRounds('oppRoundDots', opp?.roundsWon || 0);

    // ---- مركز المزايدة ----
    document.getElementById('bidDisplay').innerText = st.bid || 0;
    // تحديد اسم صاحب المزايدة بشكل صحيح
    let bidderDisplayName = 'ابدأ المزايدة';
    if (st.bidderId) {
        if (st.bidderId === p1.id) bidderDisplayName = `عند "${p1.name}"`;
        else if (p2 && st.bidderId === p2.id) bidderDisplayName = `عند "${p2.name}"`;
    }
    document.getElementById('bidderName').innerText = bidderDisplayName;

    // ---- زر المزايدة ----
    const inAuction      = st.status === 'auction';
    const iAmLastBidder  = st.bidderId === me.id;
    const myBidBtn       = document.getElementById('myBidBtn');
    myBidBtn.style.display = inAuction ? 'flex' : 'none';
    myBidBtn.disabled      = iAmLastBidder;

    // ---- زر "روح أنت" ----
    const goBtn = document.getElementById('goBtn');
    // يُفعَّل: في مزاد + فيه مزايدة + الخصم هو صاحب المزايدة (= أنا لست صاحبها)
    const canGo = inAuction && (st.bid || 0) > 0 && !iAmLastBidder && !!st.bidderId;
    goBtn.disabled = !canGo;

    // ---- زر السكب (للهوست فقط في المزاد) ----
    document.getElementById('skipBtn').style.display = (isHost && inAuction) ? 'block' : 'none';

    // ---- شاشة التحدي ----
    if (st.status === 'challenging') {
        document.getElementById('challengeOverlay').style.display = 'flex';
        const pts = st.points || 0;
        document.getElementById('liveCounter').innerText  = pts;
        document.getElementById('reachedVal').innerText   = pts;
        document.getElementById('goalVal').innerText      = st.bid;
        document.getElementById('myClickVal').innerText   = pts;
        document.getElementById('oppClickVal').innerText  = pts;
        document.getElementById('myClickBox').style.display  = 'flex';
        document.getElementById('oppClickBox').style.display = 'flex';

        // من يُعدِّد؟ = صاحب المزايدة (bidderId)
        // من يضغط؟ = الطرف الآخر
        const imTheCounter = (me.id === st.bidderId);
        const clicker = document.getElementById('mainClicker');

        if (imTheCounter) {
            clicker.classList.add('locked');
            document.getElementById('clickerHint').innerText  = 'صاحبك يسجل لك..';
            document.getElementById('chHeader').innerText     = `🗣️ عدد ${st.bid} شيء!`;
        } else {
            clicker.classList.remove('locked');
            document.getElementById('clickerHint').innerText  = 'اضغط مع كل إجابة ✓';
            document.getElementById('chHeader').innerText     = '🖱️ اضغط مع كل إجابة صحيحة';
        }

        if (!localTimer) startTimer();
    } else {
        document.getElementById('challengeOverlay').style.display = 'none';
        document.getElementById('myClickBox').style.display       = 'none';
        document.getElementById('oppClickBox').style.display      = 'none';
        stopTimer();
    }
}

// ==============================
// الكتابة التدريجية
// ==============================
function typeWriter(text) {
    const qEl  = document.getElementById('qText');
    const line = document.getElementById('qUnderline');
    qEl.innerHTML   = '';
    line.style.width = '0';
    let i = 0;
    function type() {
        if (i < text.length) { qEl.innerHTML += text.charAt(i++); setTimeout(type, 40); }
        else { line.style.width = '85%'; }
    }
    setTimeout(type, 350);
}

function renderRounds(id, count) {
    const dots = document.getElementById(id).children;
    for (let i = 0; i < 3; i++) dots[i].className = i < count ? 'dot won' : 'dot';
}

// ==============================
// التايمر الموحد
// ==============================
function startTimer() {
    if (localTimer) return;
    localTimer = setInterval(() => {
        const st = roomData.state;
        if (!st?.startTime) return;
        const elapsed   = Math.floor((Date.now() - st.startTime) / 1000);
        const remaining = Math.max(0, 30 - elapsed);
        const el = document.getElementById('timerDisplay');
        el.innerText = remaining;
        el.classList.toggle('warning', remaining <= 5);

        if (remaining === 0 && !finalizeLock) {
            finalizeLock = true;
            stopTimer();
            // كلا الطرفين يحاول finalizeRound، لكن حقل finalized في Firebase يمنع التكرار
            finalizeRound(false);
        }
    }, 250);
}

function stopTimer() {
    if (localTimer) { clearInterval(localTimer); localTimer = null; }
}

// ==============================
// الأوامر الرئيسية
// ==============================
window.hostStartGame = () => {
    update(stateRef, { status: 'auction' });
};

window.bid = () => {
    const me = roomData[myKey];
    if (!me) return;
    update(stateRef, { bid: (roomData.state?.bid || 0) + 1, bidderId: me.id });
};

window.sendGo = () => {
    update(stateRef, { 
        status: 'challenging', points: 0, 
        startTime: Date.now(), finalized: false 
    });
};

// تسجيل نقرة - كلا الطرفين قادر على هذا
window.registerPoint = () => {
    const st = roomData.state;
    if (!st || st.status !== 'challenging' || finalizeLock) return;

    const newPts = (st.points || 0) + 1;
    // تحديث النقاط في Firebase
    update(stateRef, { points: newPts });

    // وصلنا الهدف! - كلا الطرفين يطلق finalizeRound
    if (newPts >= st.bid && !finalizeLock) {
        finalizeLock = true;
        stopTimer();
        finalizeRound(true); // المزايِد فاز (وصل الهدف)
    }
};

// ==============================
// إنهاء الجولة - محمي من التكرار
// المنطق: bidderWon = true يعني الشخص الذي زايد (وقبل التحدي) فاز
// بالمعنى العملي: إذا وصل الهدف = المزايِد فاز (هو يُعدِّد وصاحبه يصادق)
// إذا انتهى الوقت = الضاغط (الخصم) فاز
// ==============================
async function finalizeRound(bidderWon) {
    // اقرأ أحدث بيانات مباشرة من Firebase
    let snap;
    try { snap = await get(roomRef); } catch(e) { return; }
    if (!snap.exists()) return;

    const data = snap.val();
    const st   = data.state;
    const p1   = data.p1;
    const p2   = data.p2;

    // حماية: إذا كان finalized = true فلا تنفذ شيئاً
    if (st.finalized) return;
    if (!p1 || !p2 || !st.bidderId) return;

    // اضبط finalized فوراً لمنع الطرف الآخر
    try { await update(stateRef, { finalized: true }); } catch(e) { return; }

    // تحديد الرابح
    // bidderWon=true: رابح = المزايِد (bidderId)
    // bidderWon=false (انتهى الوقت): رابح = الضاغط (الطرف الآخر)
    const winnerId = bidderWon 
        ? st.bidderId 
        : (st.bidderId === p1.id ? p2.id : p1.id);
    
    const wKey = winnerId === p1.id ? 'p1' : 'p2';
    const lKey = wKey === 'p1' ? 'p2' : 'p1';
    const newScore = (data[wKey].score || 0) + 1;

    if (newScore >= 5) {
        // فاز بنقاط الجولة
        const newRounds = (data[wKey].roundsWon || 0) + 1;
        await update(ref(db, `auction_pro/${pin}/${wKey}`), { score: 0, roundsWon: newRounds });
        await update(ref(db, `auction_pro/${pin}/${lKey}`), { score: 0 });

        if (newRounds >= 2) {
            // فوز نهائي بالمباراة (Best of 3)
            await update(stateRef, { 
                status: 'gameover', winnerId,
                bid: 0, bidderId: null, points: 0, startTime: 0, finalized: true
            });
        } else {
            // نهاية جولة، جولة جديدة
            await update(stateRef, { 
                status: 'roundover', roundWinnerId: winnerId,
                bid: 0, bidderId: null, points: 0, 
                q: randomQ(), startTime: 0, finalized: true
            });
            setTimeout(() => {
                update(stateRef, { status: 'auction', finalized: false });
            }, 4000);
        }
    } else {
        // نقطة عادية، استمر
        await update(ref(db, `auction_pro/${pin}/${wKey}`), { score: newScore });
        update(stateRef, { 
            status: 'auction', bid: 0, bidderId: null, points: 0, 
            q: randomQ(), startTime: 0, finalized: false 
        });
    }
}

// ==============================
// السكب
// ==============================
window.showSkipDialog  = () => { document.getElementById('skipOverlay').style.display = 'flex'; };
window.closeSkipDialog = () => { document.getElementById('skipOverlay').style.display = 'none'; };
window.confirmSkip     = () => {
    document.getElementById('skipOverlay').style.display = 'none';
    update(stateRef, { 
        status: 'auction', bid: 0, bidderId: null, points: 0, 
        q: randomQ(), startTime: 0, finalized: false 
    });
};

function showMsg(title, body) {
    document.getElementById('msgTitle').innerText = title;
    document.getElementById('msgBody').innerText  = body;
    document.getElementById('msgOverlay').style.display = 'flex';
}
window.hideOverlay = () => { document.getElementById('msgOverlay').style.display = 'none'; };
</script>
