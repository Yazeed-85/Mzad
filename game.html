<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي المزاد المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fbbf24; --bg: #0f172a; --card: #1e293b;
            --danger: #ef4444; --success: #10b981; --accent: #8b5cf6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; user-select: none; }
        
        body { 
            background: var(--bg); color: white; height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden;
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            touch-action: manipulation;
        }

        /* كود الغرفة - يظهر فوق كل شيء */
        .pin-tag { 
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            font-size: 1.2rem; color: var(--primary); font-weight: 900;
            background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 50px;
            border: 2px solid var(--primary); z-index: 3000; box-shadow: 0 0 15px rgba(251,191,36,0.3);
        }

        /* --- الشريط العلوي (السؤال السينمائي) --- */
        .top-header {
            background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(15px);
            padding: 40px 20px 20px; border-bottom: 3px solid var(--accent); text-align: center;
            z-index: 10; min-height: 140px; display: flex; flex-direction: column; justify-content: center;
        }
        
        #qText { 
            font-size: 1.8rem; font-weight: 900; color: #fff; 
            line-height: 1.3; max-width: 900px; margin: 0 auto;
            text-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }
        
        .q-underline {
            height: 5px; width: 0; background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 12px auto 0; border-radius: 10px;
            animation: pulse-glow 2s infinite; transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: scaleX(0.8); }
            50% { opacity: 1; transform: scaleX(1.1); box-shadow: 0 0 25px var(--primary); }
        }

        /* --- ساحة اللعب المنقسمة --- */
        .arena { flex: 1; display: flex; position: relative; width: 100%; }
        .player-side {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; position: relative;
        }
        .side-1 { border-left: 1px solid rgba(255,255,255,0.05); }

        /* الكونسول المركزي */
        .center-hub {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; z-index: 5; text-align: center;
            background: var(--bg); border: 4px solid var(--accent);
            border-radius: 35px; padding: 20px; box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }

        .current-bid-val { font-size: 4.5rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .bidder-name { font-size: 1rem; color: #fff; font-weight: bold; margin-top: 5px; opacity: 0.9; }

        /* --- الأزرار --- */
        .btn { border: none; border-radius: 18px; cursor: pointer; font-weight: 900; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-plus { width: 85px; height: 85px; border-radius: 50%; background: var(--success); font-size: 3rem; color: #000; margin-bottom: 15px; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
        .btn-go { width: 100%; padding: 16px; background: var(--accent); color: white; font-size: 1.2rem; }
        .btn-go:disabled { background: #334155; opacity: 0.5; cursor: not-allowed; }
        .btn-start { background: var(--primary); color: #000; padding: 15px 50px; font-size: 1.5rem; margin-top: 20px; border-radius: 50px; }

        /* --- واجهة التحدي --- */
        .challenge-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 2500;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #timerDisplay { font-size: 7rem; font-weight: 900; color: var(--danger); margin-bottom: 15px; }
        .clicker-box {
            width: 260px; height: 260px; border-radius: 50%;
            background: radial-gradient(circle, #3b82f6, #1d4ed8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(59,130,246,0.5); border: 10px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }
        .count-val { font-size: 6rem; font-weight: 900; }

        /* --- لوحة النتائج (Best of 3) --- */
        .footer-scores {
            background: var(--card); padding: 12px 20px; display: flex; justify-content: space-around;
            border-top: 2px solid #334155; z-index: 10;
        }
        .round-dots { display: flex; gap: 8px; margin-top: 6px; justify-content: center; }
        .dot { width: 14px; height: 14px; border-radius: 50%; background: #334155; }
        .dot.won { background: var(--success); box-shadow: 0 0 10px var(--success); }

        /* شاشة اللوبي */
        #lobbyUI { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background-image: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
        }

        .overlay-msg { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }

        @media (max-width: 600px) {
            .arena { flex-direction: column; }
            .side-1 { border-left: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .center-hub { width: 220px; padding: 15px; }
            .current-bid-val { font-size: 3.5rem; }
            #qText { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="pin-tag" id="pinDisplay">PIN: ----</div>

    <div class="top-header">
        <div id="qContainer">
            <h2 id="qText">انتظار بدء التحدي...</h2>
            <div class="q-underline" id="qUnderline"></div>
        </div>
    </div>

    <div id="lobbyUI">
        <h1 style="font-size: 3.5rem; color: var(--primary); margin-bottom: 15px; font-weight: 900;">المزاد 🔥</h1>
        <p id="lobbyStatus" style="font-size: 1.2rem; color: #94a3b8; margin-bottom: 30px;">في انتظار الخصم...</p>
        <div id="hostActions" style="display: none;">
            <button class="btn btn-start" onclick="hostStartGame()">▶️ ابدأ التحدي الآن</button>
        </div>
    </div>

    <div class="arena">
        <div class="player-side side-1" id="side-p1">
            <h3 id="p1Label" style="font-size: 1.3rem; margin-bottom: 15px; color: #94a3b8;">اللاعب 1</h3>
            <div id="p1ActionArea"></div>
            <div style="font-size: 3rem; font-weight: 900; color: var(--accent); margin-top: 15px;" id="p1ScoreLabel">0</div>
        </div>

        <div class="center-hub">
            <div style="color: #94a3b8; font-size: 0.9rem; font-weight: bold;">أعلى مزايدة وصلت</div>
            <div class="current-bid-val" id="bidDisplay">0</div>
            <div class="bidder-name" id="bidderName">...</div>
            <button class="btn btn-go" id="goBtn" style="margin-top: 15px;" onclick="sendGo()">روح أنت 🚀</button>
        </div>

        <div class="player-side side-2" id="side-p2">
            <h3 id="p2Label" style="font-size: 1.3rem; margin-bottom: 15px; color: #94a3b8;">اللاعب 2</h3>
            <div id="p2ActionArea"></div>
            <div style="font-size: 3rem; font-weight: 900; color: var(--accent); margin-top: 15px;" id="p2ScoreLabel">0</div>
        </div>
    </div>

    <div class="challenge-overlay" id="challengeOverlay">
        <div id="timerDisplay">30</div>
        <div class="clicker-box" id="mainClicker" onclick="registerPoint()">
            <span class="count-val" id="liveCounter">0</span>
            <span id="clickerInstruction" style="font-weight: bold; margin-top: 10px;">اضغط هنا</span>
        </div>
        <div style="margin-top: 30px; font-size: 1.8rem; color: var(--primary); font-weight: 900;">الهدف: <span id="goalVal">0</span></div>
    </div>

    <div class="footer-scores">
        <div style="text-align: center;">
            <span id="p1NameFooter" style="font-weight: bold;">...</span>
            <div class="round-dots" id="p1Rounds"><div class="dot"></div><div class="dot"></div></div>
        </div>
        <div style="font-size: 1.8rem; font-weight: 900; color: var(--accent); align-self: center;">VS</div>
        <div style="text-align: center;">
            <span id="p2NameFooter" style="font-weight: bold;">...</span>
            <div class="round-dots" id="p2Rounds"><div class="dot"></div><div class="dot"></div></div>
        </div>
    </div>

    <div class="overlay-msg" id="msgOverlay">
        <h1 id="msgTitle" style="font-size: 3.5rem; color: var(--primary); margin-bottom: 20px;"></h1>
        <p id="msgBody" style="font-size: 1.4rem; margin-bottom: 30px; color: #cbd5e1;"></p>
        <button class="btn btn-go" style="width: auto; padding: 15px 60px;" onclick="hideOverlay()">متابعة</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyB5CobIKfYdAz8jaabJpMQrGoqS9Ton28Y", authDomain: "buttons-f3501.firebaseapp.com", databaseURL: "https://buttons-f3501-default-rtdb.firebaseio.com", projectId: "buttons-f3501" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const pin = urlParams.get('pin');
    const myName = urlParams.get('name');
    const isHost = urlParams.get('role') === 'host';
    const myId = "p_" + Date.now();

    document.getElementById('pinDisplay').innerText = `PIN: ${pin}`;

    const roomRef = ref(db, `auction_pro/${pin}`);
    const stateRef = ref(db, `auction_pro/${pin}/state`);

    const cats = [
        "ماركة سيارات يابانية", "اسم بنت بحرف (س)", "أكلة سعودية مشهورة", "دولة أوروبية", "ماركة عطور فخمة", "شيء يوجد في المطبخ لونه أبيض", "تطبيق جوال مشهور", "اسم نبي ذكر في القرآن", "حيوان زاحف", "ماركة ملابس رياضية", "مكون في شاورما الدجاج", "كوكب في المجموعة الشمسية", "مهنة طبية", "مدينة عربية سياحية", "ماركة ساعات عالمية"
    ];

    let roomData = {};
    let localTimer;

    if(isHost) {
        set(roomRef, {
            p1: { id: myId, name: myName, score: 0, roundsWon: 0 },
            state: { status: 'lobby', bid: 0, bidderId: null, q: cats[Math.floor(Math.random() * cats.length)], points: 0 }
        });
    } else {
        get(roomRef).then(snap => {
            if(snap.exists()) update(roomRef, { p2: { id: myId, name: myName, score: 0, roundsWon: 0 } });
        });
    }

    onValue(roomRef, snap => {
        if(!snap.exists()) return;
        const newData = snap.val();
        
        // تأثير الكتابة التدريجية عند تغيير السؤال
        if (roomData.state?.q !== newData.state.q && newData.state.status === 'auction') {
            typeWriter(newData.state.q);
        }
        
        roomData = newData;
        renderUI();
    });

    function renderUI() {
        const st = roomData.state;
        const p1 = roomData.p1;
        const p2 = roomData.p2;

        if (st.status === 'lobby') {
            document.getElementById('lobbyUI').style.display = 'flex';
            if (p1 && p2) {
                document.getElementById('lobbyStatus').innerText = `الخصم متصل: ${myId === p1.id ? p2.name : p1.name}`;
                if (isHost) document.getElementById('hostActions').style.display = 'block';
            }
        } else { document.getElementById('lobbyUI').style.display = 'none'; }

        document.getElementById('bidDisplay').innerText = st.bid;
        document.getElementById('bidderName').innerText = st.bidderId ? (st.bidderId === p1.id ? p1.name : p2?.name) : "ابدأ المزايدة";
        
        document.getElementById('p1Label').innerText = p1.name;
        document.getElementById('p2Label').innerText = p2?.name || "انتظار الخصم...";
        document.getElementById('p1ScoreLabel').innerText = p1.score;
        document.getElementById('p2ScoreLabel').innerText = p2?.score || 0;
        
        document.getElementById('p1NameFooter').innerText = p1.name;
        document.getElementById('p2NameFooter').innerText = p2?.name || "...";
        renderRounds('p1Rounds', p1.roundsWon);
        renderRounds('p2Rounds', p2?.roundsWon || 0);

        // واجهة المزايدة
        const action1 = document.getElementById('p1ActionArea');
        const action2 = document.getElementById('p2ActionArea');
        action1.innerHTML = (myId === p1.id && st.status === 'auction') ? `<button class="btn btn-plus" onclick="bid()">+</button>` : '';
        if(p2) action2.innerHTML = (myId === p2.id && st.status === 'auction') ? `<button class="btn btn-plus" onclick="bid()">+</button>` : '';

        const goBtn = document.getElementById('goBtn');
        goBtn.disabled = (st.status !== 'auction' || st.bid === 0 || st.bidderId === myId);

        // واجهة التحدي
        if(st.status === 'challenging') {
            document.getElementById('challengeOverlay').style.display = 'flex';
            document.getElementById('liveCounter').innerText = st.points;
            document.getElementById('goalVal').innerText = st.bid;
            const isChallenger = (myId !== st.bidderId);
            document.getElementById('mainClicker').style.pointerEvents = isChallenger ? 'auto' : 'none';
            document.getElementById('clickerInstruction').innerText = isChallenger ? 'اضغط مع كل إجابة' : 'خويك يسجل لك..';
            if(!localTimer) startTimer();
        } else {
            document.getElementById('challengeOverlay').style.display = 'none';
            stopTimer();
        }
    }

    function typeWriter(text) {
        const qElement = document.getElementById('qText');
        const line = document.getElementById('qUnderline');
        qElement.innerHTML = "";
        line.style.width = "0";
        let i = 0;
        function type() {
            if (i < text.length) {
                qElement.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 40);
            } else { line.style.width = "85%"; }
        }
        type();
    }

    function renderRounds(id, count) {
        const dots = document.getElementById(id).children;
        for(let i=0; i<2; i++) dots[i].className = i < count ? 'dot won' : 'dot';
    }

    window.hostStartGame = () => update(stateRef, { status: 'auction' });

    window.bid = () => update(stateRef, { bid: roomData.state.bid + 1, bidderId: myId });

    window.sendGo = () => update(stateRef, { status: 'challenging', points: 0, startTime: Date.now() });

    window.registerPoint = () => {
        const newPoints = roomData.state.points + 1;
        update(stateRef, { points: newPoints });
        if(newPoints >= roomData.state.bid) { stopTimer(); if(isHost) finalizeRound(true); }
    };

    function startTimer() {
        localTimer = setInterval(() => {
            const elapsed = Math.floor((Date.now() - roomData.state.startTime) / 1000);
            const remaining = Math.max(0, 30 - elapsed);
            document.getElementById('timerDisplay').innerText = remaining;
            if(remaining === 0 && isHost) finalizeRound(false);
        }, 200);
    }

    function stopTimer() { clearInterval(localTimer); localTimer = null; }

    async function finalizeRound(bidderWon) {
        const st = roomData.state;
        const winnerId = bidderWon ? st.bidderId : (st.bidderId === roomData.p1.id ? roomData.p2.id : roomData.p1.id);
        const winnerKey = (winnerId === roomData.p1.id) ? 'p1' : 'p2';
        const newScore = roomData[winnerKey].score + 1;

        if(newScore >= 5) {
            const newRounds = roomData[winnerKey].roundsWon + 1;
            await update(ref(db, `auction_pro/${pin}/${winnerKey}`), { score: 0, roundsWon: newRounds });
            await update(ref(db, `auction_pro/${pin}/${winnerKey === 'p1' ? 'p2' : 'p1'}`), { score: 0 });
            if(newRounds >= 2) { showFinalWinner(roomData[winnerKey].name); } 
            else { showRoundOverlay(roomData[winnerKey].name); resetMatch(); }
        } else {
            await update(ref(db, `auction_pro/${pin}/${winnerKey}`), { score: newScore });
            resetMatch();
        }
    }

    function resetMatch() {
        const nextQ = cats[Math.floor(Math.random() * cats.length)];
        update(stateRef, { status: 'auction', bid: 0, bidderId: null, points: 0, q: nextQ });
    }

    function showRoundOverlay(name) {
        const over = document.getElementById('msgOverlay');
        document.getElementById('msgTitle').innerText = "نهاية الجولة!";
        document.getElementById('msgBody').innerText = `كفو يا ${name}، فزت بهذه الجولة!`;
        over.style.display = 'flex';
    }

    function showFinalWinner(name) {
        const over = document.getElementById('msgOverlay');
        document.getElementById('msgTitle').innerText = "بطل المزاد! 🏆";
        document.getElementById('msgBody').innerText = `يا وحش يا ${name}، حسمت المباراة لصالحك!`;
        over.style.display = 'flex';
        if(isHost) setTimeout(() => update(stateRef, { status: 'lobby' }), 5000);
    }

    window.hideOverlay = () => { document.getElementById('msgOverlay').style.display = 'none'; };
</script>
</body>
</html>
