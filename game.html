<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تحدي المزاد - مباشر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* =========================================
   1. المتغيرات والتنسيق العام
   ========================================= */
:root { 
    --primary: #fbbf24; 
    --bg: #0f172a; 
    --card: #1e293b; 
    --danger: #ef4444; 
    --success: #10b981; 
    --game-purple: #8774e1;
    --game-border: #27272a;
}

/* حماية الجوال (منع النسخ والزوم) */
* { 
    box-sizing: border-box; margin: 0; padding: 0; 
    font-family: 'Cairo', sans-serif; 
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
}
input, textarea, select { user-select: auto; }

body { 
    background: var(--bg); 
    color: white; 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 20px; 
    background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
}

/* =========================================
   2. الواجهة العلوية (PIN & Score)
   ========================================= */
.top-bar {
    width: 100%;
    max-width: 500px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    z-index: 100;
}

.pin-container { 
    background: rgba(251, 191, 36, 0.1); 
    border: 2px solid var(--primary); 
    padding: 8px 15px; 
    border-radius: 12px; 
    font-size: 1.1rem; 
    font-weight: 900; 
    color: var(--primary); 
    box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
}

.scoreboard { 
    display: flex; gap: 15px; background: var(--card); 
    padding: 8px 25px; border-radius: 50px; 
    border: 1px solid rgba(255,255,255,0.1); 
}
.player-score { text-align: center; }
.score-val { font-size: 1.8rem; font-weight: 900; color: var(--primary); }

/* =========================================
   3. بطاقة اللعبة الرئيسية
   ========================================= */
.game-card { 
    background: var(--card); 
    width: 100%; 
    max-width: 500px; 
    border-radius: 30px; 
    padding: 30px; 
    text-align: center; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
    position: relative;
    border: 1px solid rgba(255,255,255,0.05);
}

.q-box { 
    min-height: 120px; display: flex; align-items: center; 
    justify-content: center; margin-bottom: 20px; 
    border-bottom: 1px dashed #334155; padding-bottom: 20px; 
}
#qText { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; line-height: 1.5; }

/* المزايدة */
.bid-val { font-size: 5.5rem; font-weight: 900; color: var(--primary); margin: 5px 0; text-shadow: 0 0 20px rgba(251,191,36,0.3); }
.btn-bid { width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 2.2rem; cursor: pointer; color: white; transition: 0.2s; }
.btn-plus { background: var(--success); box-shadow: 0 4px 15px rgba(16,185,129,0.3); }
.btn-minus { background: var(--danger); box-shadow: 0 4px 15px rgba(239,68,68,0.3); }

.btn-go { 
    width: 100%; padding: 18px; border-radius: 15px; border: none; 
    background: linear-gradient(135deg, #7c3aed, #5b21b6); 
    color: white; font-size: 1.3rem; font-weight: 900; 
    cursor: pointer; margin-top: 25px; transition: 0.2s;
    box-shadow: 0 5px 15px rgba(124,58,237,0.4);
}
.btn-go:disabled { background: #334155 !important; color: #64748b; cursor: not-allowed; opacity: 0.6; box-shadow: none; }

/* التحدي والعداد */
#timerDisplay { font-size: 4.5rem; font-weight: 900; color: var(--danger); margin-bottom: 10px; }
.clicker-btn { 
    width: 190px; height: 190px; border-radius: 50%; 
    border: 10px solid rgba(255,255,255,0.1); 
    background: radial-gradient(circle, #3b82f6, #1d4ed8); 
    color: white; font-size: 4rem; 
    font-weight: 900; cursor: pointer; margin: 20px auto; 
    display: flex; align-items: center; justify-content: center; 
    box-shadow: 0 0 30px rgba(59,130,246,0.5); 
    transition: 0.1s;
}
.clicker-btn:active { transform: scale(0.95); }

.overlay { 
    position: fixed; inset: 0; background: var(--bg); 
    z-index: 200; display: none; align-items: center; 
    justify-content: center; font-size: 9rem; 
    font-weight: 900; color: var(--primary); 
}

/* تحسين الجوال */
@media (max-width: 600px) {
    body { padding: 10px; }
    .top-bar { flex-direction: column; gap: 10px; }
    .bid-val { font-size: 4.5rem; }
}
</style>
</head>
<body>

    <div class="top-bar">
        <div class="pin-container">كود الغرفة: <span id="pinDisplay">----</span></div>
        <div class="scoreboard">
            <div class="player-score"><div id="p1Score" class="score-val">0</div><div id="p1Name" style="font-size:0.7rem; color:#94a3b8;">...</div></div>
            <div style="font-size: 1.5rem; opacity: 0.2; align-self: center;">|</div>
            <div class="player-score"><div id="p2Score" class="score-val">0</div><div id="p2Name" style="font-size:0.7rem; color:#94a3b8;">...</div></div>
        </div>
    </div>

    <div class="game-card" id="mainCard">
        <div id="lobbyScreen" style="padding: 40px; font-weight: bold; color: var(--primary);">جاري انتظار اللاعب الآخر للتحدي...</div>

        <div id="auctionUI" style="display:none">
            <div class="q-box"><h2 id="qText">جاري تحميل السؤال...</h2></div>
            <div class="bid-val" id="bidDisplay">0</div>
            <div style="display:flex; justify-content:center; gap:25px;">
                <button class="btn-bid btn-minus" onclick="updateBid(-1)">-</button>
                <button class="btn-bid btn-plus" onclick="updateBid(1)">+</button>
            </div>
            <button class="btn-go" id="challengeBtn" onclick="initiateChallenge()">🚀 روح أنت (اتحدى صديقك)</button>
        </div>

        <div id="challengeUI" style="display:none">
            <div id="timerDisplay">30</div>
            <p id="instructionText" style="margin-bottom: 15px; font-weight: bold; color: var(--primary);">...</p>
            <div class="clicker-btn" id="clicker" onclick="handlePoint()">0</div>
            <p style="margin-top: 15px;">الهدف المطلوب: <b id="targetDisplay" style="color:var(--primary); font-size: 1.5rem;">0</b></p>
        </div>
    </div>

    <div class="overlay" id="countdownOverlay">3</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyB5CobIKfYdAz8jaabJpMQrGoqS9Ton28Y", authDomain: "buttons-f3501.firebaseapp.com", databaseURL: "https://buttons-f3501-default-rtdb.firebaseio.com", projectId: "buttons-f3501" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const pin = urlParams.get('pin');
        const myName = urlParams.get('name');
        const isHost = urlParams.get('role') === 'host';
        const myId = "p_" + Date.now();

        if (pin) document.getElementById('pinDisplay').innerText = pin;

        const roomRef = ref(db, `auction/${pin}`);
        const stateRef = ref(db, `auction/${pin}/state`);

        // === مكتبة الأسئلة العامة الضخمة (بدون كرة قدم) ===
        const cats = [
            "ماركة سيارات عالمية", "دولة أوروبية", "مدينة سعودية", "اسم بنت يبدأ بحرف (م)", "اسم ولد يبدأ بحرف (س)", "نوع فاكهة", "ماركة جوالات", "مهنة طبية", "أداة مطبخ", "اسم نبي", "شركة تقنية", "لون من ألوان الطبيعة", "جهاز إلكتروني في البيت", "حيوان أليف", "مادة دراسية", "اسم بنت يبدأ بحرف (ل)", "مدينة عربية مشهورة", "ماركة ملابس فخمة", "عطر مشهور", "اسم حيوان مفترس", "مكون من مكونات البيتزا", "تطبيق تواصل اجتماعي", "شيء يوجد في الطائرة", "لغة عالمية", "مشروب ساخن", "اسم ولد بحرف (أ)", "ماركة ساعات", "شيء يلبس في الشتاء", "معدن نفيس", "كوكب في الفضاء", "عالم أو مخترع", "قائد تاريخي", "نوع حلويات شرقية", "شيء يوجد في الحمام", "أداة مدرسية", "برنامج تلفزيوني مشهور", "ماركة أحذية رياضية", "شيء يوجد في الصيدلية", "اسم بنت بحرف (ن)", "حيوان بحري", "شيء يطير في الجو", "فعل يبدأ بحرف (ي)", "صفة جميلة في الإنسان", "شيء لونه أبيض", "عضو في جسم الإنسان", "اسم ولد بحرف (ر)", "ماركة مكياج عالمية", "شيء يوجد في شنطة السفر", "نوع من أنواع المكسرات", "ماركة قهوة مشهورة", "دولة آسيوية", "اسم بنت بحرف (ر)", "شيء يوجد في غرفة النوم", "ماركة شنط عالمية", "مكون في ساندوتش البرجر", "شيء يشتغل بالبطارية", "عاصمة دولة عالمية", "حيوان زاحف", "شيء يوجد في المكتب", "اسم ولد بحرف (ف)", "لعبة فيديو مشهورة", "ماركة نظارات", "شيء لونه أخضر", "جبل أو هضبة معروفة", "اسم بنت بحرف (ج)", "شيء يوجد في السيارة", "اسم صحابي مشهور", "كائن فضائي في الأفلام", "نوع من أنواع الورود", "ماركة ساعات ذكية", "شيء حاد في المطبخ", "اسم ولد بحرف (ع)", "دولة خليجية", "نوع من التوابل", "شيء ثقيل الوزن", "اسم بنت بحرف (س)", "تطبيق توصيل طلبات", "شيء لونه أصفر", "اسم ولد بحرف (د)", "شركة طيران مشهورة"
        ];
        const questions = cats.map(c => `كم تقدر تذكر ${c} في 30 ثانية؟`);

        let roomState = {};
        let localTimer;
        
        if(isHost) {
            set(roomRef, { 
                p1: { id: myId, name: myName, score: 0 },
                state: { status: 'lobby', bid: 0, q: questions[Math.floor(Math.random() * questions.length)], lastBidder: null }
            });
        } else {
            get(roomRef).then(snap => {
                if(snap.exists()) {
                    update(roomRef, { p2: { id: myId, name: myName, score: 0 } });
                    update(stateRef, { status: 'auction' });
                }
            });
        }

        onValue(roomRef, snap => {
            if(!snap.exists()) return;
            const data = snap.val();
            const oldStatus = roomState.state?.status;
            roomState = data;
            if (oldStatus === 'auction' && data.state.status === 'countdown') runLocalCountdown();
            renderUI(data);
        });

        function renderUI(data) {
            document.getElementById('p1Name').innerText = data.p1?.name || "...";
            document.getElementById('p2Name').innerText = data.p2?.name || "...";
            document.getElementById('p1Score').innerText = data.p1?.score || 0;
            document.getElementById('p2Score').innerText = data.p2?.score || 0;

            const st = data.state;
            const cBtn = document.getElementById('challengeBtn');

            if(st.status === 'auction') {
                showScreen('auctionUI');
                document.getElementById('bidDisplay').innerText = st.bid;
                document.getElementById('qText').innerText = st.q;
                cBtn.disabled = (st.lastBidder === myId);
                cBtn.innerText = (st.lastBidder === myId) ? "انتظر مزايدة خويك" : "🚀 روح أنت (اتحدى صديقك)";
            } else if(st.status === 'challenging') {
                showScreen('challengeUI');
                document.getElementById('targetDisplay').innerText = st.bid;
                document.getElementById('clicker').innerText = st.points || 0;
                document.getElementById('instructionText').innerText = (myId === st.challengerId) ? "صديقك يجاوب.. وأنت سجل نقاطه!" : "دورك تجاوب! خويك يسجل نقاطك";
            } else if(st.status === 'result') {
                clearInterval(localTimer);
                showScreen('lobbyScreen');
                document.getElementById('lobbyScreen').innerText = "انتهت الجولة! جاري التحضير...";
                if(isHost) setTimeout(resetRound, 3000);
            }
        }

        function showScreen(id) {
            ['lobbyScreen', 'auctionUI', 'challengeUI'].forEach(s => document.getElementById(s).style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        window.updateBid = (val) => {
            const newBid = Math.max(0, roomState.state.bid + val);
            update(stateRef, { bid: newBid, lastBidder: myId });
        };

        window.initiateChallenge = () => {
            update(stateRef, { status: 'countdown', challengerId: myId });
        };

        function runLocalCountdown() {
            const overlay = document.getElementById('countdownOverlay');
            overlay.style.display = 'flex';
            let c = 3;
            const iv = setInterval(() => {
                overlay.innerText = c;
                if(c === 0) {
                    clearInterval(iv);
                    overlay.style.display = 'none';
                    if (isHost) update(stateRef, { status: 'challenging', points: 0 });
                    startTimer();
                }
                c--;
            }, 1000);
        }

        function startTimer() {
            let t = 30;
            clearInterval(localTimer);
            localTimer = setInterval(() => {
                t--;
                document.getElementById('timerDisplay').innerText = t;
                if(t <= 0) {
                    clearInterval(localTimer);
                    if(isHost) checkWinner();
                }
            }, 1000);
        }

        window.handlePoint = () => {
            if(myId !== roomState.state.challengerId) return; 
            const p = (roomState.state.points || 0) + 1;
            update(stateRef, { points: p });
            if (p >= roomState.state.bid) {
                clearInterval(localTimer);
                if(isHost) checkWinner();
            }
        };

        async function checkWinner() {
            const finalPoints = roomState.state.points || 0;
            const target = roomState.state.bid;
            const challengerId = roomState.state.challengerId;
            const defenderId = (challengerId === roomState.p1.id) ? (roomState.p2?.id) : roomState.p1.id;
            let winnerId = (finalPoints >= target) ? defenderId : challengerId;
            const playerKey = (winnerId === roomState.p1.id) ? 'p1' : 'p2';
            const currentScore = roomState[playerKey].score;
            await update(ref(db, `auction/${pin}/${playerKey}`), { score: currentScore + 1 });
            await update(stateRef, { status: 'result' });
        }

        function resetRound() {
            const newQ = questions[Math.floor(Math.random() * questions.length)];
            update(stateRef, { status: 'auction', bid: 0, q: newQ, points: 0, lastBidder: null });
        }
    </script>
</body>
</html>
