<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي المزاد - مباشر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fbbf24; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* تصميم كود الغرفة المضاف */
        .pin-container {
            background: rgba(251, 191, 36, 0.1);
            border: 2px solid var(--primary);
            padding: 10px 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--primary);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
        }

        .scoreboard { display: flex; gap: 20px; margin-bottom: 20px; background: var(--card); padding: 10px 30px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); }
        .player-score { text-align: center; padding: 0 15px; }
        .score-val { font-size: 2rem; font-weight: 900; color: var(--primary); }
        
        .game-card { background: var(--card); width: 100%; max-width: 500px; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .q-box { min-height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border-bottom: 1px dashed #334155; padding-bottom: 20px; }
        #qText { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; }

        /* Auction UI */
        .bid-val { font-size: 5rem; font-weight: 900; color: var(--primary); margin: 10px 0; }
        .btn-bid { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 2rem; cursor: pointer; color: white; transition: 0.2s; }
        .btn-plus { background: var(--success); }
        .btn-minus { background: var(--danger); }
        .btn-go { width: 100%; padding: 18px; border-radius: 15px; border: none; background: linear-gradient(135deg, #7c3aed, #5b21b6); color: white; font-size: 1.3rem; font-weight: 900; cursor: pointer; margin-top: 20px; }

        /* Challenge UI */
        #timerDisplay { font-size: 4rem; font-weight: 900; color: var(--danger); }
        .clicker-btn { width: 200px; height: 200px; border-radius: 50%; border: 10px solid rgba(255,255,255,0.1); background: #3b82f6; color: white; font-size: 4rem; font-weight: 900; cursor: pointer; margin: 20px auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(59,130,246,0.5); }
        
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; align-items: center; justify-content: center; font-size: 8rem; font-weight: 900; color: var(--primary); }
    </style>
</head>
<body>

    <div class="pin-container">
        كود الانضمام: <span id="pinDisplay">----</span>
    </div>

    <div class="scoreboard">
        <div class="player-score"><div id="p1Score" class="score-val">0</div><div id="p1Name" style="font-size:0.8rem">...</div></div>
        <div style="font-size: 2rem; opacity: 0.2;">|</div>
        <div class="player-score"><div id="p2Score" class="score-val">0</div><div id="p2Name" style="font-size:0.8rem">...</div></div>
    </div>

    <div class="game-card" id="mainCard">
        <div id="lobbyScreen">جاري انتظار اللاعب الآخر...</div>

        <div id="auctionUI" style="display:none">
            <div class="q-box"><h2 id="qText">كم تقدر تذكر...</h2></div>
            <p style="color:#94a3b8">المزايدة الحالية:</p>
            <div class="bid-val" id="bidDisplay">5</div>
            <div style="display:flex; justify-content:center; gap:20px;">
                <button class="btn-bid btn-minus" onclick="updateBid(-1)">-</button>
                <button class="btn-bid btn-plus" onclick="updateBid(1)">+</button>
            </div>
            <button class="btn-go" id="challengeBtn" onclick="sendChallenge()">🚀 روح أنت (اتحدى خويك)</button>
        </div>

        <div id="challengeUI" style="display:none">
            <div id="timerDisplay">30</div>
            <p id="instructionText">صديقك يجاوب.. وأنت اضغط سجل النقاط!</p>
            <div class="clicker-btn" id="clicker" onclick="handlePoint()">0</div>
            <p>الهدف المطلوب: <b id="targetDisplay" style="color:var(--primary)">0</b></p>
        </div>
    </div>

    <div class="overlay" id="countdownOverlay">3</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyB5CobIKfYdAz8jaabJpMQrGoqS9Ton28Y", authDomain: "buttons-f3501.firebaseapp.com", databaseURL: "https://buttons-f3501-default-rtdb.firebaseio.com", projectId: "buttons-f3501" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const pin = urlParams.get('pin');
        const myName = urlParams.get('name');
        const isHost = urlParams.get('role') === 'host';
        const myId = "p_" + Date.now();

        // عرض الكود فور التحميل
        if (pin) document.getElementById('pinDisplay').innerText = pin;

        const roomRef = ref(db, `auction/${pin}`);
        const stateRef = ref(db, `auction/${pin}/state`);

        const cats = [
            "سيارة يابانية مشهورة", "اسم بنت يبدأ بحرف (أ)", "اسم ولد يبدأ بحرف (م)", "لاعب كرة قدم سعودي", "دولة أوروبية", "ماركة ملابس عالمية", "شركة تقنية معروفة", "مدينة عربية سياحية", "تطبيق تواصل اجتماعي", "فاكهة صيفية", "عالم أو مخترع شهير", "قائد تاريخي عظيم", "مسلسل كرتوني قديم", "نادي كرة قدم عالمي", "أكلة شعبية سعودية", "حيوان مفترس", "شيء يوجد في الطائرة", "مهنة طبية", "جهاز إلكتروني في البيت", "ماركة عطور فخمة", "جبل أو هضبة مشهورة", "لغة برمجة", "نظام تشغيل", "اسم نبي ذكر في القرآن", "شخصية تاريخية سعودية", "اسم مدينة سعودية تبدأ بحرف (ج)", "ماركة ساعات", "شيء لونه أزرق", "مكون في شاورما الدجاج", "كوكب في المجموعة الشمسية"
        ];
        const questions = cats.map(c => `كم تقدر تذكر ${c} في 30 ثانية؟`);

        let roomState = {};
        
        if(isHost) {
            set(roomRef, { 
                p1: { id: myId, name: myName, score: 0 },
                state: { status: 'lobby', bid: 5, q: questions[0] }
            });
        } else {
            get(roomRef).then(snap => {
                if(snap.exists()) {
                    update(roomRef, { p2: { id: myId, name: myName, score: 0 } });
                    update(stateRef, { status: 'auction' });
                }
            });
        }

        onValue(roomRef, snap => {
            if(!snap.exists()) return;
            const data = snap.val();
            roomState = data;
            renderUI(data);
        });

        function renderUI(data) {
            document.getElementById('p1Name').innerText = data.p1?.name || "...";
            document.getElementById('p2Name').innerText = data.p2?.name || "...";
            document.getElementById('p1Score').innerText = data.p1?.score || 0;
            document.getElementById('p2Score').innerText = data.p2?.score || 0;

            const st = data.state;
            if(st.status === 'auction') {
                showScreen('auctionUI');
                document.getElementById('bidDisplay').innerText = st.bid;
                document.getElementById('qText').innerText = st.q;
            } else if(st.status === 'challenging') {
                showScreen('challengeUI');
                document.getElementById('targetDisplay').innerText = st.bid;
                document.getElementById('clicker').innerText = st.points || 0;
                document.getElementById('instructionText').innerText = (myId === st.challengerId) ? "خويك يجاوب.. وأنت اضغط سجل النقاط!" : "دورك تجاوب! خويك يسجل نقاطك";
            } else if(st.status === 'result') {
                alert(`انتهى الوقت! النتيجة: ${st.points} من أصل ${st.bid}`);
                if(isHost) resetRound();
            }
        }

        function showScreen(id) {
            ['lobbyScreen', 'auctionUI', 'challengeUI'].forEach(s => document.getElementById(s).style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        window.updateBid = (val) => {
            const newBid = Math.max(1, roomState.state.bid + val);
            update(stateRef, { bid: newBid });
        };

        window.sendChallenge = () => {
            const overlay = document.getElementById('countdownOverlay');
            overlay.style.display = 'flex';
            let c = 3;
            const iv = setInterval(() => {
                overlay.innerText = c;
                if(c === 0) {
                    clearInterval(iv);
                    overlay.style.display = 'none';
                    update(stateRef, { status: 'challenging', challengerId: myId, points: 0 });
                    startTimer();
                }
                c--;
            }, 1000);
        };

        function startTimer() {
            let t = 30;
            const tIv = setInterval(() => {
                t--;
                document.getElementById('timerDisplay').innerText = t;
                if(t <= 0) {
                    clearInterval(tIv);
                    if(isHost) checkWinner();
                }
            }, 1000);
        }

        window.handlePoint = () => {
            if(myId !== roomState.state.challengerId) return; 
            const p = (roomState.state.points || 0) + 1;
            update(stateRef, { points: p });
        };

        async function checkWinner() {
            const finalPoints = roomState.state.points || 0;
            const target = roomState.state.bid;
            const challengerId = roomState.state.challengerId;
            const defenderId = (challengerId === roomState.p1.id) ? (roomState.p2?.id) : roomState.p1.id;
            let winnerId = (finalPoints >= target) ? defenderId : challengerId;
            const playerKey = (winnerId === roomState.p1.id) ? 'p1' : 'p2';
            const currentScore = roomState[playerKey].score;
            await update(ref(db, `auction/${pin}/${playerKey}`), { score: currentScore + 1 });
            await update(stateRef, { status: 'result' });
        }

        function resetRound() {
            const newQ = questions[Math.floor(Math.random() * questions.length)];
            update(stateRef, { status: 'auction', bid: 5, q: newQ, points: 0 });
        }
    </script>
</body>
</html>
